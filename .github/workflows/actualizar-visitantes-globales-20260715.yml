name: Actualizar visitantes globales

on:
  push:
    paths:
      - .github/workflows/actualizar-visitantes-globales-20260715.yml

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Modificar catalogo
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          ruta = Path("natura/catalogo.html")
          texto = ruta.read_text(encoding="utf-8")

          def reemplazar_uno(anterior, nuevo, nombre):
              global texto
              cantidad = texto.count(anterior)
              if cantidad != 1:
                  raise SystemExit(f"No se pudo reemplazar {nombre}: coincidencias={cantidad}")
              texto = texto.replace(anterior, nuevo, 1)

          reemplazar_uno(
              "<!-- v: 2026-07-11 - contador semanal en panel plegable cerrado por defecto. -->",
              "<!-- v: 2026-07-15 - visitantes globales: total historico y visitantes de hoy por ciudad. -->",
              "version"
          )

          css_anterior = '''    .visitor-week-table tbody td:last-child{
              text-align:center;
              font-weight:900;
            }
'''
          css_nuevo = css_anterior + '''    .visitor-week-table--cities tbody td:nth-child(2),
            .visitor-week-table--cities tbody td:nth-child(3){
              text-align:center;
              font-weight:900;
            }
            .visitor-week-table--cities th:first-child,
            .visitor-week-table--cities td:first-child{
              width:50%;
            }
'''
          reemplazar_uno(css_anterior, css_nuevo, "estilos de la tabla por ciudad")

          reemplazos_texto = [
              ("Visitantes esta semana:", "Visitantes globales esta semana:"),
              ("Hoy: <strong id=\"visitorTodayTotal\">", "Hoy en el mundo: <strong id=\"visitorTodayTotal\">"),
              ("Ciudad principal: <strong id=\"visitorTopCity\">", "Ciudad principal global: <strong id=\"visitorTopCity\">"),
              ("aria-label=\"Detalle de visitantes de la semana\"", "aria-label=\"Detalle global de visitantes\""),
              ("aria-label=\"Visitantes de la semana por día\"", "aria-label=\"Visitantes globales de los últimos siete días\""),
              ("Visitantes de la semana por día", "Visitantes globales de los últimos 7 días")
          ]
          for anterior, nuevo in reemplazos_texto:
              reemplazar_uno(anterior, nuevo, anterior)

          bloque_ciudades_anterior = '''          <article class="visitor-week-card" aria-label="Visitantes de la semana por ciudad">
            <div class="visitor-week-table-wrap">
              <table class="visitor-week-table">
                <thead>
                  <tr class="visitor-week-title-row">
                    <th colspan="2" scope="colgroup">Visitantes de la semana por ciudad</th>
                  </tr>
                  <tr>
                    <th scope="col">Ciudad</th>
                    <th scope="col">Cantidad</th>
                  </tr>
                </thead>
                <tbody id="visitorWeekCitiesBody" aria-live="polite">
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td></tr>
                </tbody>
              </table>
            </div>
          </article>'''

          bloque_ciudades_nuevo = '''          <article class="visitor-week-card" aria-label="Visitantes globales por ciudad y país">
            <div class="visitor-week-table-wrap">
              <table class="visitor-week-table visitor-week-table--cities">
                <thead>
                  <tr class="visitor-week-title-row">
                    <th colspan="3" scope="colgroup">Visitantes globales por ciudad</th>
                  </tr>
                  <tr>
                    <th scope="col">Ciudad / país</th>
                    <th scope="col">Total visitantes</th>
                    <th scope="col">Visitantes hoy</th>
                  </tr>
                </thead>
                <tbody id="visitorWeekCitiesBody" aria-live="polite">
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                  <tr><td>--</td><td>--</td><td>--</td></tr>
                </tbody>
              </table>
            </div>
          </article>'''
          reemplazar_uno(bloque_ciudades_anterior, bloque_ciudades_nuevo, "tabla global por ciudad")

          reemplazar_uno(
              "  <!-- Visitantes semanales: Firebase, GPS y respaldo por IP -->",
              "  <!-- Visitantes globales: Firebase, GPS y respaldo por IP -->",
              "comentario del modulo"
          )

          inicio_anterior = '''      pintarDias(fechas, lecturas);
              pintarCiudades(lecturas);
              actualizarResumenVisitantes(lecturas);
              statusEl.textContent = "Cargando visitantes...";'''
          inicio_nuevo = '''      pintarDias(fechas, lecturas);
              pintarCiudades(null);
              actualizarResumenVisitantes(lecturas, null);
              statusEl.textContent = "Cargando visitantes globales...";'''
          reemplazar_uno(inicio_anterior, inicio_nuevo, "inicio de visitantes")

          callback_anterior = '''        snapshot => {
                  const visitasPorDia = extraerVisitasSemana(snapshot.val(), fechas);
                  for (const fecha of fechas) {
                    lecturas.set(fecha, visitasPorDia.get(fecha) || {});
                  }
                  pintarDias(fechas, lecturas);
                  pintarCiudades(lecturas);
                  actualizarResumenVisitantes(lecturas);
                  statusEl.textContent = "";
                },'''
          callback_nuevo = '''        snapshot => {
                  const usuarios = snapshot.val();
                  const visitasPorDia = extraerVisitasSemana(usuarios, fechas);
                  const ciudadesGlobales = extraerCiudadesGlobales(usuarios, hoy);
                  for (const fecha of fechas) {
                    lecturas.set(fecha, visitasPorDia.get(fecha) || {});
                  }
                  pintarDias(fechas, lecturas);
                  pintarCiudades(ciudadesGlobales);
                  actualizarResumenVisitantes(lecturas, ciudadesGlobales);
                  statusEl.textContent = "";
                },'''
          reemplazar_uno(callback_anterior, callback_nuevo, "lectura global de Firebase")

          marcador = '''    function pintarDias(fechas, lecturas) {'''
          if texto.count(marcador) != 1:
              raise SystemExit("No se encontró el marcador para insertar el acumulado global")

          funcion_global = '''    function extraerCiudadesGlobales(usuarios, hoy) {
              const cantidades = new Map();

              if (!usuarios || typeof usuarios !== "object") return cantidades;

              for (const registroUsuario of Object.values(usuarios)) {
                if (!registroUsuario || typeof registroUsuario !== "object") continue;

                const visitasCatalogo = registroUsuario[CATALOGO_NODO];
                if (!visitasCatalogo || typeof visitasCatalogo !== "object") continue;

                for (const [fecha, visita] of Object.entries(visitasCatalogo)) {
                  if (!/^\\d{4}-\\d{2}-\\d{2}$/.test(fecha)) continue;
                  if (!visita || typeof visita !== "object") continue;

                  const ciudad = normalizarTexto(visita.ciudad || "Ubicación no disponible");
                  const pais = normalizarTexto(visita.pais || "");
                  const etiqueta = pais ? `${ciudad}, ${pais}` : ciudad;
                  const actual = cantidades.get(etiqueta) || {
                    ciudad: etiqueta,
                    total: 0,
                    hoy: 0
                  };

                  actual.total += 1;
                  if (fecha === hoy) actual.hoy += 1;
                  cantidades.set(etiqueta, actual);
                }
              }

              return cantidades;
            }

'''
          texto = texto.replace(marcador, funcion_global + marcador, 1)

          patron_ciudades = re.compile(
              r'    function pintarCiudades\(lecturas\) \{.*?\n    \}\n\n    function actualizarResumenVisitantes',
              re.S
          )
          funcion_ciudades = '''    function pintarCiudades(cantidades) {
              const ciudades = cantidades instanceof Map
                ? [...cantidades.values()]
                    .sort((a, b) =>
                      b.total - a.total ||
                      b.hoy - a.hoy ||
                      a.ciudad.localeCompare(b.ciudad, "es")
                    )
                    .slice(0, MAX_CITY_ROWS)
                : null;

              const fragmento = document.createDocumentFragment();

              for (let index = 0; index < MAX_CITY_ROWS; index += 1) {
                const fila = document.createElement("tr");
                const celdaCiudad = document.createElement("td");
                const celdaTotal = document.createElement("td");
                const celdaHoy = document.createElement("td");
                const item = ciudades ? ciudades[index] : null;

                if (ciudades === null) {
                  celdaCiudad.textContent = "--";
                  celdaTotal.textContent = "--";
                  celdaHoy.textContent = "--";
                } else if (item) {
                  celdaCiudad.textContent = item.ciudad;
                  celdaTotal.textContent = String(item.total);
                  celdaHoy.textContent = String(item.hoy);
                } else {
                  celdaCiudad.textContent = "";
                  celdaTotal.textContent = "";
                  celdaHoy.textContent = "";
                  celdaCiudad.className = "visitor-empty-cell";
                  celdaTotal.className = "visitor-empty-cell";
                  celdaHoy.className = "visitor-empty-cell";
                }

                fila.append(celdaCiudad, celdaTotal, celdaHoy);
                fragmento.appendChild(fila);
              }

              citiesBody.replaceChildren(fragmento);
            }

            function actualizarResumenVisitantes'''
          texto, cantidad = patron_ciudades.subn(funcion_ciudades, texto, count=1)
          if cantidad != 1:
              raise SystemExit(f"No se pudo reemplazar pintarCiudades: coincidencias={cantidad}")

          patron_resumen = re.compile(
              r'    function actualizarResumenVisitantes\(lecturas\) \{.*?\n    \}\n\n    async function obtenerUbicacionPreferida',
              re.S
          )
          funcion_resumen = '''    function actualizarResumenVisitantes(lecturas, ciudadesGlobales) {
              const hoy = fechaColombia(Date.now());
              let totalSemana = 0;
              let totalHoy = 0;
              let hayLecturasPendientes = false;

              for (const [fecha, lectura] of lecturas.entries()) {
                if (lectura === null) {
                  hayLecturasPendientes = true;
                  continue;
                }
                if (!lectura || typeof lectura !== "object") continue;

                const visitas = Object.values(lectura);
                totalSemana += visitas.length;
                if (fecha === hoy) totalHoy = visitas.length;
              }

              if (hayLecturasPendientes || !(ciudadesGlobales instanceof Map)) {
                weekTotalEl.textContent = "--";
                todayTotalEl.textContent = "--";
                topCityEl.textContent = "Cargando...";
                return;
              }

              const ciudadPrincipal = [...ciudadesGlobales.values()]
                .sort((a, b) =>
                  b.total - a.total ||
                  b.hoy - a.hoy ||
                  a.ciudad.localeCompare(b.ciudad, "es")
                )[0];

              weekTotalEl.textContent = String(totalSemana);
              todayTotalEl.textContent = String(totalHoy);
              topCityEl.textContent = ciudadPrincipal ? ciudadPrincipal.ciudad : "Sin datos";
            }

            async function obtenerUbicacionPreferida'''
          texto, cantidad = patron_resumen.subn(funcion_resumen, texto, count=1)
          if cantidad != 1:
              raise SystemExit(f"No se pudo reemplazar el resumen: coincidencias={cantidad}")

          ruta.write_text(texto, encoding="utf-8", newline="\n")
          PY

      - name: Validar cambios
        shell: bash
        run: |
          grep -q "Visitantes globales por ciudad" natura/catalogo.html
          grep -q "Total visitantes" natura/catalogo.html
          grep -q "Visitantes hoy" natura/catalogo.html
          grep -q "function extraerCiudadesGlobales" natura/catalogo.html
          grep -q "visitor-week-table--cities" natura/catalogo.html

      - name: Publicar cambio
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add natura/catalogo.html
          git rm .github/workflows/actualizar-visitantes-globales-20260715.yml
          git commit -m "Mostrar visitantes globales por ciudad"
          git push
