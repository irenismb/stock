  try{const s=await get(legacyRef);const total=Math.max(contarHijos(s),totalMinimoHistorico);totalAnterior=total;pintarTotal();await runTransaction(contadorTotalRef,actual=>Math.max(Number(actual)||0,total,totalMinimoHistorico))}catch(e){pintarTotal();console.error(e)}
 }
 async function registrarVisitante(user){
  if(!user)return;
  const visitaRef=ref(db,`${base}/ultimas_salidas/${user.uid}`);
  try{let nuevo=false;await runTransaction(visitaRef,actual=>{if(actual===null){nuevo=true;return{primera_visita:Date.now(),ultima_visita:Date.now()}}nuevo=false;actual.ultima_visita=Date.now();return actual});if(nuevo)await runTransaction(contadorTotalRef,actual=>Math.max(Number(actual)||0,totalMinimoHistorico)+1)}catch(e){console.error(e)}
  try{await set(ref(db,`${base}/visitantes_por_dia/${hoy}/${user.uid}`),{ultima_visita:serverTimestamp()})}catch(e){todayVisitCount.textContent='--';console.error(e)}
 }
 async function intentarRegistro(user,estaConectado){
  if(!user||!estaConectado||registrando||registrado)return;registrando=true;
  const miConexion=push(ref(db,`${base}/conexiones/${user.uid}`)),ultimaSalida=ref(db,`${base}/ultimas_salidas/${user.uid}`);
  try{await onDisconnect(miConexion).remove();await onDisconnect(ultimaSalida).set(serverTimestamp());await set(miConexion,{activo:true,desde:serverTimestamp()});registrado=true;visitorStatus.textContent=''}catch(e){visitorStatus.textContent='Revisa reglas de Realtime Database';console.error(e)}finally{registrando=false}
 }
 function pintarTotal(){totalVisitCount.textContent=Math.max(totalMinimoHistorico,totalAnterior,totalGuardado)}
 function contarHijos(snapshot){let total=0;snapshot.forEach(()=>total++);return total}
 function fechaHoyColombia(){return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Bogota',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date())}
}
