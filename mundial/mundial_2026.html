const prev=document.getElementById("prev");
const next=document.getElementById("next");
const title=document.getElementById("title");
const view=document.getElementById("view");
const countryFilter=document.getElementById("countryFilter");
let diaActual=Math.max(0,dias.findIndex(d=>new Date(`${d}T23:59:59-05:00`).getTime()>=Date.now()));
let paisActual="";
function iniciar(){
 dates.innerHTML=dias.map((d,i)=>`<option value="${i}">${fechaCorta(d)}</option>`).join("");
 prev.onclick=()=>mover(-1);
 next.onclick=()=>mover(1);
 dates.onchange=e=>{paisActual="";if(countryFilter)countryFilter.value="";mostrar(+e.target.value)};
 countryFilter.onchange=e=>{const pais=e.target.value;pais?mostrarPais(pais):mostrar(diaActual)};
 document.onkeydown=e=>{if(!paisActual&&e.key==="ArrowLeft")mover(-1);if(!paisActual&&e.key==="ArrowRight")mover(1)};
 pintarPaises();
 mostrar(diaActual);
 setInterval(actualizar,1000);
}
function pintarPaises(){
 const paises=[...new Set(partidos.flatMap(p=>p.partido.split(" vs ")))].sort((a,b)=>a.localeCompare(b,"es"));
 if(countryFilter)countryFilter.innerHTML=`<option value="">Todas las selecciones</option>${paises.map(p=>`<option value="${p}">${p}</option>`).join("")}`;
}
function juegan(partido,pais){
 const equipos=partido.partido.split(" vs ");
 return equipos[0]===pais||equipos[1]===pais;
}
function mover(n){
 const i=diaActual+n;
 if(i>=0&&i<dias.length){paisActual="";if(countryFilter)countryFilter.value="";mostrar(i)}
}
function mostrar(i){
 diaActual=i;
 const fecha=dias[i];
 const lista=partidos.filter(p=>p.fecha===fecha).sort((a,b)=>a.hora.localeCompare(b.hora));
 title.textContent=fechaLarga(fecha);
 dates.value=i;
 prev.disabled=i===0;
 next.disabled=i===dias.length-1;
 view.innerHTML=lista.length?tabla(lista,false):'<div class="empty">Sin partidos</div>';
 activarPais();
 actualizar();
}
function mostrarPais(pais){
 paisActual=pais;
 const lista=partidos.filter(p=>juegan(p,pais)).sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora));
 title.textContent=`Partidos de ${pais}`;
 prev.disabled=diaActual===0;
 next.disabled=diaActual===dias.length-1;
 view.innerHTML=lista.length?tabla(lista,true):'<div class="empty">Sin partidos para este país</div>';
 activarPais();
 actualizar();
}
function activarPais(){
 if(countryFilter)countryFilter.value=paisActual||"";
}
function tabla(lista,conFecha){
 const cabecera=conFecha?"<th>Fecha</th>":"";
 return `<table><thead><tr>${cabecera}<th>Hora</th><th>Partido</th><th class="group">Grupo</th><th>Falta</th><th>Termina</th></tr></thead><tbody>${lista.map(p=>`<tr data-partido="${p.partido}">${conFecha?`<td class="dateCell" data-label="Fecha">${fechaCorta(p.fecha)}</td>`:""}<td class="time" data-label="Hora">${hora12(p.hora)}</td><td data-label="Partido">${p.partido}</td><td class="group" data-label="Grupo">${p.grupo}</td><td class="left" data-label="Falta" data-start="${p.fecha}T${p.hora}:00-05:00">...</td><td class="endleft" data-label="Termina">...</td></tr>`).join("")}</tbody></table>`;
}
function actualizar(){
 const celdas=[...document.querySelectorAll(".left[data-start]")];
 const ahora=Date.now();
 const actuales=[];
 let proxima=null;
 let menor=Infinity;
 celdas.forEach(el=>{
  const fila=el.closest("tr");
  const finEl=fila?fila.querySelector(".endleft"):null;
  if(fila)fila.classList.remove("nextMatch");
  const inicio=new Date(el.dataset.start).getTime();
  const fin=inicio+120*60*1000;
  el.className="left";
  if(finEl)finEl.className="endleft";
  if(ahora<inicio){
   el.textContent=duracion(inicio-ahora);
   if(finEl)finEl.textContent=duracion(fin-ahora);
   if(inicio<menor){menor=inicio;proxima=fila}
   return;
  }
  if(ahora<=fin){
   el.textContent="En juego";
   el.classList.add("live");
   if(finEl){
    finEl.textContent=duracion(fin-ahora);
    finEl.classList.add("live");
   }
   if(fila)actuales.push(fila);
   return;
  }
  el.textContent="Finalizado";
  el.classList.add("done");
  if(finEl){
   finEl.textContent="Finalizado";
   finEl.classList.add("done");
  }
 });
 const filasMarcadas=actuales.length?actuales:(proxima?[proxima]:[]);
 filasMarcadas.forEach(fila=>fila.classList.add("nextMatch"));
}
function duracion(ms){
 const s=Math.max(0,Math.floor(ms/1000));
 const d=Math.floor(s/86400);
 const h=Math.floor(s%86400/3600);
 const m=Math.floor(s%3600/60);
 const seg=s%60;
 if(d>0)return `${d}d ${h}h ${m}m`;
 return `${h}h ${m}m ${seg}s`;
}
function hora12(h){
 const [hh,mm]=h.split(":").map(Number);
 return `${hh%12||12}:${String(mm).padStart(2,"0")} ${hh>=12?"p. m.":"a. m."}`;
}
function fechaLarga(f){
 const [a,m,d]=f.split("-").map(Number);
 return new Intl.DateTimeFormat("es-CO",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(new Date(a,m-1,d)).replace(/^./,c=>c.toUpperCase());
}
function fechaCorta(f){
 const [a,m,d]=f.split("-").map(Number);
 return new Intl.DateTimeFormat("es-CO",{weekday:"short",day:"2-digit",month:"short"}).format(new Date(a,m-1,d));
}
iniciar();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getDatabase, ref, push, set, update, onValue, onDisconnect, serverTimestamp, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig={
 apiKey:"AIzaSyCrC5pmGyX-VaX4f-KI0AU8A6GWP-YDngM",
 authDomain:"mundial-a9de1.firebaseapp.com",
 databaseURL:"https://mundial-a9de1-default-rtdb.firebaseio.com",
 projectId:"mundial-a9de1",
 storageBucket:"mundial-a9de1.firebasestorage.app",
 messagingSenderId:"598028608340",
 appId:"1:598028608340:web:a176c1fbdfcef564419ec1",
 measurementId:"G-YJY5PWKPGJ"
};

const visitorCount=document.getElementById("visitorCount");
const todayVisitCount=document.getElementById("todayVisitCount");
const totalVisitCount=document.getElementById("totalVisitCount");
const visitorStatus=document.getElementById("visitorStatus");
const visitorCities=document.getElementById("visitorCities");
const firebasePendiente=Object.values(firebaseConfig).some(v=>String(v).includes("PEGA_AQUI"));
const totalMinimoHistorico=9;

if(firebasePendiente){
 visitorCount.textContent="--";
 todayVisitCount.textContent="--";
 totalVisitCount.textContent=totalMinimoHistorico;
 visitorCities.textContent="";
 visitorStatus.textContent="Pendiente configurar Firebase Realtime Database";
}else{
 iniciarVisitantes();
}

async function iniciarVisitantes(){
 const app=initializeApp(firebaseConfig);
 const auth=getAuth(app);
 const db=getDatabase(app);
 const base="presencia_mundial_2026";
 const hoy=fechaHoyColombia();
 const conexionesRaiz=ref(db,`${base}/conexiones`);
 const legacyRef=ref(db,`${base}/ultimas_salidas`);
 const contadorTotalRef=ref(db,`${base}/contadores/visitantes_totales`);
 const conectadoRef=ref(db,".info/connected");
 const desfaseServidorRef=ref(db,".info/serverTimeOffset");
 const conexionVivaMs=120000;
 const latidoMs=30000;
 let usuario=null;
 let conectado=false;
 let registrando=false;
 let registrado=false;
 let totalAnterior=totalMinimoHistorico;
 let totalGuardado=totalMinimoHistorico;
 let conexionesSnapshot=null;
 let desfaseServidor=0;
 let latidoId=null;
 let conexionActual=null;
 let ubicacionVisitante={ciudad:"Ubicación no disponible",pais:"",etiqueta:"Ubicación no disponible"};

 visitorStatus.textContent="";
 visitorCities.textContent="";
 pintarTotal();

 onValue(conexionesRaiz,snapshot=>{
  conexionesSnapshot=snapshot;
  pintarVisitantesAhora();
 },error=>{
  visitorStatus.textContent="Sin lectura de visitantes";
  console.error(error);
 });

 onValue(desfaseServidorRef,snapshot=>{
  const n=Number(snapshot.val());
  desfaseServidor=Number.isFinite(n)?n:0;
  pintarVisitantesAhora();
 });

 onValue(legacyRef,snapshot=>{
  totalAnterior=Math.max(contarHijos(snapshot),totalMinimoHistorico);
  todayVisitCount.textContent=contarVisitantesHoy(snapshot,hoy);
  pintarTotal();
 },error=>{
  totalAnterior=totalMinimoHistorico;
  todayVisitCount.textContent="--";
  pintarTotal();
  console.error(error);
 });

 onValue(contadorTotalRef,snapshot=>{
  const n=Number(snapshot.val());
  totalGuardado=Number.isFinite(n)?Math.max(n,totalMinimoHistorico):totalMinimoHistorico;
  pintarTotal();
 },error=>{
  totalGuardado=totalMinimoHistorico;
  pintarTotal();
  console.error(error);
 });

 onAuthStateChanged(auth,async user=>{
  usuario=user;
  if(user){
   await asegurarTotalHistorico();
   await registrarVisitante(user);
   intentarRegistro(user,conectado);
  }
 });

 onValue(conectadoRef,snapshot=>{
  conectado=snapshot.val()===true;
  if(!conectado){
   registrado=false;
   detenerLatido();
  }
  visitorStatus.textContent=conectado?"":"Sin conexión";
  intentarRegistro(usuario,conectado);
 });

 obtenerUbicacionVisitante().then(ubicacion=>{
  ubicacionVisitante=ubicacion;
  if(conexionActual)actualizarUbicacionConexion(conexionActual);
  intentarRegistro(usuario,conectado);
 }).catch(error=>console.error(error));

 try{
  await signInAnonymously(auth);
 }catch(error){
  visitorStatus.textContent="Activa Authentication anónimo";
  console.error(error);
 }

 async function asegurarTotalHistorico(){
  try{
   const snapshot=await get(legacyRef);
   const total=Math.max(contarHijos(snapshot),totalMinimoHistorico);
   totalAnterior=total;
   todayVisitCount.textContent=contarVisitantesHoy(snapshot,hoy);
   pintarTotal();
  }catch(error){
   pintarTotal();
   console.error(error);
  }
 }

 async function registrarVisitante(user){
  if(!user)return;
  const visitaRef=ref(db,`${base}/ultimas_salidas/${user.uid}`);
  try{
   let nuevo=false;
   await runTransaction(visitaRef,actual=>{
    if(actual===null){
     nuevo=true;
     return {primera_visita:Date.now(),ultima_visita:Date.now()};
    }
    if(typeof actual==="number"){
     nuevo=false;
     return {primera_visita:actual,ultima_visita:Date.now()};
    }
    nuevo=false;
    actual.ultima_visita=Date.now();
    return actual;
   });
  }catch(error){
   console.error(error);
  }
 }

 async function intentarRegistro(user,estaConectado){
  if(!user||!estaConectado||registrando||registrado)return;
  registrando=true;
  const miConexion=push(ref(db,`${base}/conexiones/${user.uid}`));
  const ultimaSalida=ref(db,`${base}/ultimas_salidas/${user.uid}/ultima_visita`);
  try{
   await onDisconnect(miConexion).remove();
   await onDisconnect(ultimaSalida).set(serverTimestamp());
   await set(miConexion,{activo:true,desde:serverTimestamp(),visto:serverTimestamp(),ciudad:ubicacionVisitante.ciudad,pais:ubicacionVisitante.pais,ubicacion:ubicacionVisitante.etiqueta});
   conexionActual=miConexion;
   registrado=true;
   iniciarLatido(miConexion);
   visitorStatus.textContent="";
  }catch(error){
   visitorStatus.textContent="Revisa reglas de Realtime Database";
   console.error(error);
  }finally{
   registrando=false;
  }
 }

 function iniciarLatido(miConexion){
  detenerLatido();
  latidoId=setInterval(()=>{
   update(miConexion,{activo:true,visto:serverTimestamp()}).catch(error=>console.error(error));
  },latidoMs);
 }

 function detenerLatido(){
  if(latidoId){
   clearInterval(latidoId);
   latidoId=null;
  }
  conexionActual=null;
 }

 function actualizarUbicacionConexion(miConexion){
  update(miConexion,{ciudad:ubicacionVisitante.ciudad,pais:ubicacionVisitante.pais,ubicacion:ubicacionVisitante.etiqueta}).catch(error=>console.error(error));
 }

 function pintarVisitantesAhora(){
  visitorCount.textContent=conexionesSnapshot?contarConexionesActivas(conexionesSnapshot):"--";
  visitorCities.innerHTML=conexionesSnapshot?pintarCiudadesActivas(conexionesSnapshot):"";
 }

 function pintarTotal(){
  totalVisitCount.textContent=Math.max(totalMinimoHistorico,totalAnterior,totalGuardado);
 }

 function contarHijos(snapshot){
  let total=0;
  snapshot.forEach(()=>{total++;});
  return total;
 }

 function contarConexionesActivas(snapshot){
  const ahoraServidor=Date.now()+desfaseServidor;
  let total=0;
  snapshot.forEach(usuarioSnapshot=>{
   usuarioSnapshot.forEach(conexionSnapshot=>{
    const valor=conexionSnapshot.val();
    const marca=Number(valor&&valor.visto);
    if(valor&&valor.activo===true&&Number.isFinite(marca)&&Math.abs(ahoraServidor-marca)<=conexionVivaMs)total++;
   });
  });
  return total;
 }

 function pintarCiudadesActivas(snapshot){
  const ciudades=contarCiudadesActivas(snapshot);
  if(!ciudades.length)return "";
  return `<strong>Ahora por ciudad:</strong> ${ciudades.map(item=>`${item.ciudad}: ${item.total}`).join(" · ")}`;
 }

 function contarCiudadesActivas(snapshot){
  const ahoraServidor=Date.now()+desfaseServidor;
  const ciudades=new Map();
  snapshot.forEach(usuarioSnapshot=>{
   usuarioSnapshot.forEach(conexionSnapshot=>{
    const valor=conexionSnapshot.val();
    const marca=Number(valor&&valor.visto);
    if(!valor||valor.activo!==true||!Number.isFinite(marca)||Math.abs(ahoraServidor-marca)>conexionVivaMs)return;
    const ciudad=normalizarTexto(valor.ubicacion||[valor.ciudad,valor.pais].filter(Boolean).join(", ")||"Ubicación no disponible");
    ciudades.set(ciudad,(ciudades.get(ciudad)||0)+1);
   });
  });
  return [...ciudades.entries()].map(([ciudad,total])=>({ciudad,total})).sort((a,b)=>b.total-a.total||a.ciudad.localeCompare(b.ciudad,"es"));
 }

 function contarVisitantesHoy(snapshot,hoyColombia){
  let total=0;
  snapshot.forEach(childSnapshot=>{
   const valor=childSnapshot.val();
   const marca=typeof valor==="number"?valor:Number(valor&&valor.ultima_visita);
   if(Number.isFinite(marca)&&fechaColombia(marca)===hoyColombia)total++;
  });
  return total;
 }

 function fechaHoyColombia(){
  return fechaColombia(Date.now());
 }

 function fechaColombia(fecha){
  return new Intl.DateTimeFormat("en-CA",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(fecha));
 }

 async function obtenerUbicacionVisitante(){
  const servicios=[
   {url:"https://ipapi.co/json/",ciudad:d=>d.city,pais:d=>d.country_name||d.country},
   {url:"https://api.db-ip.com/v2/free/self",ciudad:d=>d.city,pais:d=>d.countryName||d.countryCode},
   {url:"https://ipwho.is/",ciudad:d=>d.city,pais:d=>d.country||d.country_code,fallo:d=>d&&d.success===false}
  ];
  for(const servicio of servicios){
   try{
    const respuesta=await fetch(servicio.url,{cache:"no-store"});
    if(!respuesta.ok)continue;
    const datos=await respuesta.json();
    if(servicio.fallo&&servicio.fallo(datos))continue;
    const ciudad=normalizarTexto(servicio.ciudad(datos)||"");
    const pais=normalizarTexto(servicio.pais(datos)||"");
    const etiqueta=[ciudad,pais].filter(Boolean).join(", ");
    if(etiqueta)return {ciudad:ciudad||"Ubicación no disponible",pais,etiqueta};
   }catch(error){
    console.error(error);
   }
  }
  return {ciudad:"Ubicación no disponible",pais:"",etiqueta:"Ubicación no disponible"};
 }

 function normalizarTexto(valor){
  return String(valor||"").replace(/[<>]/g,"").trim().slice(0,80);
 }
}
</script>
