<!doctype html>
<!-- v: 2026-07-16 - vistas globales totales de todo el historico. -->
<html lang="es-CO">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Irenismb Stock Natura | Catálogo Natura & AVON en Santa Marta | Compra por WhatsApp</title>
  <meta name="description" content="Catálogo oficial Natura y AVON en Santa Marta: perfumes, cuidado de la piel, maquillaje y más. Asesoría personalizada y compra fácil por WhatsApp. Envíos a toda Colombia." />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
  <meta name="theme-color" content="#0b0f14" />
  <link rel="canonical" href="https://irenismb.github.io/stock/natura/catalogo.html" />
  <style>
    html,body{margin:0;min-height:100%;background:#0a0e15;color:#eef2f8;font-family:Calibri,Arial,sans-serif}
    body{display:grid;place-items:center;padding:24px;box-sizing:border-box}
    main{max-width:620px;text-align:center;line-height:1.5}
    a{color:#6ee7d1}
  </style>
</head>
<body>
  <main id="estadoCarga">
    <p>Cargando catálogo...</p>
    <p><a href="catalogo-base-20260715.html">Abrir catálogo base</a></p>
  </main>
  <script>
    (async function cargarCatalogo(){
      try{
        const respuesta = await fetch("catalogo-base-20260715.html?v=20260715", { cache:"no-store" });
        if(!respuesta.ok) throw new Error("HTTP " + respuesta.status);

        let html = await respuesta.text();
        html = html
          .replace(/Visitantes globales esta semana:/g, "Vistas globales totales:")
          .replace(/Visitantes esta semana:/g, "Vistas globales totales:")
          .replace(/Total histórico mundial:/g, "Vistas globales totales:");

        const cierreBody = "</bo" + "dy>";
        if(!html.includes(cierreBody)) throw new Error("Documento base incompleto");

        const moduloVisitantes = "<scr" + "ipt type=\"module\" src=\"visitantes-globales.js?v=20260716-2\"></scr" + "ipt>";
        const ajusteTexto = "<scr" + "ipt type=\"module\">const total=document.getElementById('visitorWeekTotal');const item=total?.closest('.visitor-week-summary-item');if(item)item.replaceChildren(document.createTextNode('Vistas globales totales: '),total);</scr" + "ipt>";
        html = html.replace(cierreBody, moduloVisitantes + "\n" + ajusteTexto + "\n" + cierreBody);

        document.open();
        document.write(html);
        document.close();
      }catch(error){
        console.error(error);
        const estado = document.getElementById("estadoCarga");
        if(estado){
          estado.innerHTML = '<p>No fue posible cargar el catálogo.</p><p><a href="catalogo-base-20260715.html">Abrir catálogo base</a></p>';
        }
      }
    })();
  </script>
</body>
</html>
